[theme]
base = "dark"
primaryColor = "#4fc3f7"
backgroundColor = "#0d1b2a"
secondaryBackgroundColor = "#1b2838"
textColor = "#ffffff"
font = "sans serif"

[server]
headless = true
enableCORS = false
enableXsrfProtection = true
maxUploadSize = 50

[browser]
gatherUsageStats = false

[runner]
fastReruns = true
